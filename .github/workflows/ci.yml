name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Tests unitaires
        run: python -m pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image (outils recon dedans)
        run: docker build -t bug-bounty:ci .
      - name: Tests dans le container
        run: docker run --rm --entrypoint sh bug-bounty:ci -c 'cd /app && python -m pytest -q'
